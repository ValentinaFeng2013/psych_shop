<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psych Shop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #c4b5fd;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(160, 90, 200, 0.15);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #7c3aed;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #a78bfa;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      text-align: left;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 2px solid #ddd6fe;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #7c3aed;
    }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #6d28d9; }
    button:disabled { background: #c4b5fd; cursor: not-allowed; }

    .message-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f5f3ff;
      border-radius: 10px;
      color: #374151;
      line-height: 1.6;
      white-space: pre-wrap;
      text-align: left;
      display: none;
    }

    .event-box {
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      color: #92400e;
      line-height: 1.5;
      text-align: left;
      white-space: pre-wrap;
      display: none;
    }

    .payment-section {
      display: none;
      margin-top: 1.5rem;
    }

    .reset-btn {
      margin-top: 1rem;
      background: #e5e7eb;
      color: #374151;
    }

    .reset-btn:hover { background: #d1d5db; }

    .loading-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f5f3ff;
      border-radius: 10px;
      color: #7c3aed;
      font-weight: 600;
      display: none;
    }

    .dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }

    .clouds {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.75;
      animation: float linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud::before {
      width: 55%;
      height: 160%;
      top: -60%;
      left: 15%;
    }

    .cloud::after {
      width: 40%;
      height: 130%;
      top: -45%;
      right: 15%;
    }

    @keyframes float {
      from { transform: translateX(-220px); }
      to   { transform: translateX(110vw); }
    }
  </style>
</head>
<body>
  <div class="clouds">
    <div class="cloud" style="width:180px;height:55px;top:8%;animation-duration:28s;animation-delay:0s;"></div>
    <div class="cloud" style="width:120px;height:38px;top:20%;animation-duration:22s;animation-delay:-8s;"></div>
    <div class="cloud" style="width:220px;height:65px;top:35%;animation-duration:35s;animation-delay:-15s;"></div>
    <div class="cloud" style="width:150px;height:45px;top:55%;animation-duration:25s;animation-delay:-5s;"></div>
    <div class="cloud" style="width:100px;height:32px;top:70%;animation-duration:20s;animation-delay:-12s;"></div>
    <div class="cloud" style="width:200px;height:60px;top:82%;animation-duration:32s;animation-delay:-20s;"></div>
  </div>
  <div class="card" style="position:relative;z-index:1;">
    <h1>Welcome to Psychology Fixings!</h1>
    <p class="subtitle">             </p>

    <div id="mood-section">
      <label for="mood-input">How are you feeling today?</label>
      <input type="text" id="mood-input" placeholder="happy, sad, angry, tired…" />
      <button id="mood-btn" onclick="submitMood()">Tell us your mood</button>
    </div>

    <div class="loading-box" id="loading-box">Connecting to bank server<span class="dots"></span></div>
    <div class="message-box" id="message-box"></div>
    <div class="event-box" id="event-box"></div>

    <div class="payment-section" id="payment-section">
      <label for="pay-input">Pay now? (yes / no):</label>
      <input type="text" id="pay-input" placeholder="yes or no" />
      <button onclick="submitPayment()">Submit</button>
    </div>

    <button class="reset-btn" id="reset-btn" onclick="reset()" style="display:none;">click for new apointment</button>
  </div>

  <script>
    let currentMood = '';
    let currentPrice = 0;

    async function submitMood() {
      const mood = document.getElementById('mood-input').value.trim();
      if (!mood) return;
      currentMood = mood;

      const btn = document.getElementById('mood-btn');
      btn.disabled = true;
      btn.textContent = 'Thinking…';

      const res = await fetch('/process_mood', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mood })
      });
      const data = await res.json();
      currentPrice = data.price;

      const msgBox = document.getElementById('message-box');
      msgBox.textContent = data.text + '\n\n' + data.prompt;
      msgBox.style.display = 'block';

      document.getElementById('mood-section').style.display = 'none';
      document.getElementById('payment-section').style.display = 'block';
    }

    async function submitPayment() {
      const payment = document.getElementById('pay-input').value.trim();
      if (!payment) return;

      document.getElementById('payment-section').style.display = 'none';
      document.getElementById('message-box').style.display = 'none';
      document.getElementById('loading-box').style.display = 'block';

      await new Promise(r => setTimeout(r, 2000));

      const res = await fetch('/process_payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ payment, mood: currentMood, price: currentPrice })
      });
      const data = await res.json();

      document.getElementById('loading-box').style.display = 'none';

      if (data.event_text) {
        const eventBox = document.getElementById('event-box');
        eventBox.textContent = data.event_text.trim();
        eventBox.style.display = 'block';
      }

      const msgBox = document.getElementById('message-box');
      msgBox.textContent = data.final_text;
      msgBox.style.display = 'block';

      document.getElementById('payment-section').style.display = 'none';
      document.getElementById('reset-btn').style.display = 'block';
    }

    function reset() {
      document.getElementById('mood-input').value = '';
      document.getElementById('pay-input').value = '';
      document.getElementById('message-box').style.display = 'none';
      document.getElementById('event-box').style.display = 'none';
      document.getElementById('loading-box').style.display = 'none';
      document.getElementById('payment-section').style.display = 'none';
      document.getElementById('reset-btn').style.display = 'none';
      document.getElementById('mood-section').style.display = 'block';
      const btn = document.getElementById('mood-btn');
      btn.disabled = false;
      btn.textContent = 'Tell us your mood';
      currentMood = '';
      currentPrice = 0;
    }

    document.getElementById('mood-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitMood();
    });
    document.getElementById('pay-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitPayment();
    });
  </script>
</body>
</html>
